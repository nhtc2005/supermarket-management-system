openapi: 3.1.0
info:
  title: Supermarket Management API
  description: API documentation for Supermarket Management System
  contact:
    name: Viet Cuong
    email: cuong.trinhvietk22@hcmut.edu.vn
  version: 1.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server
security:
  - bearerAuth: []
tags:
  - name: Customer
    description: Customer management APIs
  - name: Order
    description: Order management APIs
  - name: Employee
    description: Employee management APIs
  - name: Warehouse
    description: Warehouse management APIs
  - name: Store
    description: Store management APIs
  - name: Product Variant
    description: Product variant management APIs
  - name: Product
    description: Product management APIs
  - name: Auth
    description: Authentication APIs for customers and employees
  - name: Batch
    description: Batch management APIs
paths:
  /warehouses/{id}:
