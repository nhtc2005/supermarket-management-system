      tags:
        - Warehouse
      summary: Get warehouse by ID
      operationId: getWarehouseById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWarehouseResponse'
      security:
        - bearerAuth: []
    put:
      tags:
        - Warehouse
      summary: Update warehouse
      operationId: updateWarehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWarehouseResponse'
      security:
        - bearerAuth: []
    delete:
      tags:
        - Warehouse
      summary: Delete warehouse
      operationId: deleteWarehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
      security:
        - bearerAuth: []
  /stores/{id}:
    get:
      tags:
        - Store
      summary: Get store by ID
      operationId: getStoreById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreResponse'
      security:
        - bearerAuth: []
    put:
      tags:
        - Store
      summary: Update store
      operationId: updateStore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
