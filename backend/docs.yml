        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWarehouseResponse'
      security:
        - bearerAuth: []
  /stores:
    get:
      tags:
        - Store
      summary: Get all stores
      operationId: getAllStores
      parameters:
        - name: page
          in: query
