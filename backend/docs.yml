      description: All users can search products
      operationId: searchProducts
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: sku
          in: query
          required: false
          schema:
            type: string
        - name: barcode
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: id
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            default: ASC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseProductResponse'
      security:
        - bearerAuth: []
    post:
      tags:
        - Product
      summary: Create product
      description: Manager can create new product
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProductResponse'
      security:
        - bearerAuth: []
  /products/{productId}/variants:
