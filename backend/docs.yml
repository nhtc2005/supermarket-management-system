            type: string
            default: createdAt
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            default: DESC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageResponseOrderResponse'
      security:
        - bearerAuth: []
