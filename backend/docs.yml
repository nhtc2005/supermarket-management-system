        - bearerAuth: []
    delete:
      tags:
        - Product Variant
      summary: Delete variant
      operationId: deleteVariant
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
      security:
        - bearerAuth: []
  /products/{id}:
