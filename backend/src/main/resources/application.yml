server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    jackson:
      time-zone: Asia/Ho_Chi_Minh

jwt:
  secret: ${SECRET_KEY}

  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    url: /api-docs
    try-it-out-enabled: true
  packages-to-scan: com.example.supermarket.controller
  paths-to-match:
    - /**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: true